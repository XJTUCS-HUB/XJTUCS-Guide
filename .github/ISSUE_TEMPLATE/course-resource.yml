name: 新增或更新课程资料
description: 投稿笔记、实验经验、考核信息或外部资源
title: "[课程资料] "
labels: ["content"]
body:
  - type: markdown
    attributes:
      value: 请勿提交盗版、未公开试题、当前作业成品或个人隐私。转载内容必须保留来源和许可证。
  - type: input
    id: course
    attributes:
      label: 课程名称与代码
      placeholder: 计算机系统导论 COMP400727
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: 内容类型
      options: [笔记与复习, 实验经验, 考核信息, 往年资料, 外部资源, 课程介绍]
    validations:
      required: true
  - type: input
    id: title
    attributes:
      label: 标题
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: 作者或来源
      description: 可以使用真名、网名或匿名；转载时请填写原作者。
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: 原链接与许可证
      description: 原创内容可填写“作者原创，CC BY 4.0”。
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: 正文或资料说明
      description: 可以直接粘贴 Markdown，较长内容也可以附仓库链接。
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: 适用时间或课程版本
      description: 与特定教师、学期或版本无关时可以留空。
  - type: checkboxes
    id: confirmation
    attributes:
      label: 提交确认
      options:
        - label: 我有权发布这些内容，且内容不包含隐私、泄题或未经授权的材料。
          required: true
